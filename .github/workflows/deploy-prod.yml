name: Blue-Green Deploy to Production

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a running production deploy

env:
  JAVA_VERSION: '21'

jobs:
  # ─── 1. Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studyflow_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔧 Make mvnw executable
        run: chmod +x mvnw

      - name: Run full test suite
        run: ./mvnw verify -q
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-prod-${{ github.sha }}
          path: target/surefire-reports/
          retention-days: 30

  # ─── 2. Build & Push Docker image ─────────────────────────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      full_image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/studyflow-backend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Blue-Green Deploy ──────────────────────────────────────────────────────
  blue-green-deploy:
    name: Blue-Green Deploy
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: production
      url: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # ── Determine which slot is currently live ──────────────────────────────
      - name: Determine active slot
        id: slot
        run: |
          # Read active slot from a Railway variable or default to blue
          ACTIVE="${{ vars.ACTIVE_SLOT }}"
          if [ "$ACTIVE" = "blue" ]; then
            echo "deploy_service=${{ secrets.RAILWAY_GREEN_SERVICE_ID }}" >> "$GITHUB_OUTPUT"
            echo "live_service=${{ secrets.RAILWAY_BLUE_SERVICE_ID }}"   >> "$GITHUB_OUTPUT"
            echo "next_slot=green" >> "$GITHUB_OUTPUT"
            echo "prev_slot=blue"  >> "$GITHUB_OUTPUT"
          else
            echo "deploy_service=${{ secrets.RAILWAY_BLUE_SERVICE_ID }}"  >> "$GITHUB_OUTPUT"
            echo "live_service=${{ secrets.RAILWAY_GREEN_SERVICE_ID }}"   >> "$GITHUB_OUTPUT"
            echo "next_slot=blue"  >> "$GITHUB_OUTPUT"
            echo "prev_slot=green" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying to ${{ steps.slot.outputs.next_slot }} slot"

      # ── Deploy to the STANDBY slot ──────────────────────────────────────────
      - name: Deploy to standby slot (${{ steps.slot.outputs.next_slot }})
        run: |
          railway up \
            --service ${{ steps.slot.outputs.deploy_service }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for standby slot to start
        run: sleep 60

      # ── Health-check the standby slot ──────────────────────────────────────
      - name: Health check — standby slot
        id: health
        run: |
          URL="${{ secrets.STANDBY_URL }}/actuator/health"
          echo "Checking $URL ..."
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Standby health check passed (HTTP 200) — switching traffic"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i — HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          echo "Standby health check FAILED — rolling back, keeping ${{ steps.slot.outputs.prev_slot }} live"
          exit 1

      # ── Switch traffic: update ACTIVE_SLOT repository variable ─────────────
      - name: Switch traffic to ${{ steps.slot.outputs.next_slot }}
        if: steps.health.outputs.healthy == 'true'
        run: |
          # Update the GitHub repository variable so next deploy knows which is live
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/ACTIVE_SLOT" \
            -d "{\"name\":\"ACTIVE_SLOT\",\"value\":\"${{ steps.slot.outputs.next_slot }}\"}"
          echo "Traffic switched to ${{ steps.slot.outputs.next_slot }}"

      # ── Notify Sentry of new production release ─────────────────────────────
      - name: Notify Sentry — production release
        if: steps.health.outputs.healthy == 'true' && secrets.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
        continue-on-error: true

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "============================================"
          echo " StudyFlow Blue-Green Deploy Result"
          echo "============================================"
          echo " Commit  : ${{ github.sha }}"
          echo " Branch  : ${{ github.ref_name }}"
          echo " Actor   : ${{ github.actor }}"
          echo " Deployed to  : ${{ steps.slot.outputs.next_slot }} slot"
          echo " Health  : ${{ steps.health.outputs.healthy }}"
          echo "============================================"

  # ─── 4. Deploy Frontend to Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: blue-green-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        run: |
          cd frontend
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env SENTRY_DSN=${{ secrets.SENTRY_DSN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── 5. Slack notification ────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [ blue-green-deploy, deploy-frontend ]
    if: always()

    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.blue-green-deploy.result }}
          text: |
            StudyFlow Production Deploy: ${{ needs.blue-green-deploy.result }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,took
        continue-on-error: true

