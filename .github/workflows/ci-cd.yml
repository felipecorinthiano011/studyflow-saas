name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - 'pom.xml'
      - 'package.json'
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - 'pom.xml'
      - 'package.json'
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB 1: Build + Tests ───────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 📦 Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: 🔧 Make mvnw executable
      run: chmod +x mvnw

    - name: 🔨 Build Backend (skip tests)
      run: ./mvnw clean package -DskipTests -q

    - name: 🧪 Run Unit Tests
      run: ./mvnw test -DskipITs -q
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: 🔗 Run Integration Tests
      run: ./mvnw verify -Dtest=FrontendIntegrationTest -q
      env:
        SPRING_PROFILES_ACTIVE: test
      continue-on-error: true

    - name: 📊 Run Performance Tests
      run: ./mvnw test -Dtest=PerformanceTest -q
      env:
        SPRING_PROFILES_ACTIVE: test
      continue-on-error: true

    - name: 📈 Generate Coverage Report (JaCoCo)
      run: ./mvnw jacoco:report -q
      continue-on-error: true

    - name: 📤 Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30

    - name: 📤 Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        fail_ci_if_error: false
      continue-on-error: true

    - name: 🔍 SonarCloud Analysis
      if: ${{ secrets.SONAR_TOKEN != '' }}
      uses: SonarSource/sonarcloud-github-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=felipecorinthiano011_studyflow-saas
          -Dsonar.organization=felipecorinthiano011
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java
          -Dsonar.java.binaries=target/classes
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      continue-on-error: true

  # ─── JOB 2: Security Scan ───────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: 📊 Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # ─── JOB 3: Build & Push Docker (apenas na main, apenas se secrets configurados) ──
  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: 🏗️ Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

    - name: ✅ Image published
      run: |
        echo "✅ Docker image pushed successfully!"
        echo "📦 ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:latest"
        echo "📦 ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:${{ github.sha }}"

  # ─── JOB 4: Deploy Staging (apenas na develop) ──────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Deploy to Staging
      run: |
        echo "⏳ Staging deploy placeholder"
        echo "Configure RAILWAY_TOKEN para deploy automático"
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      continue-on-error: true

  # ─── JOB 5: Notify (resultado final) ────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-test, build-docker]
    if: always()

    steps:
    - name: 📢 Print pipeline result
      run: |
        echo "=================================="
        echo " StudyFlow CI/CD Pipeline Result"
        echo "=================================="
        echo " Branch:  ${{ github.ref_name }}"
        echo " Commit:  ${{ github.sha }}"
        echo " Author:  ${{ github.actor }}"
        echo " Tests:   ${{ needs.build-and-test.result }}"
        echo " Docker:  ${{ needs.build-docker.result }}"
        echo "=================================="

    - name: 📢 Send Slack notification
      if: ${{ secrets.SLACK_WEBHOOK != '' }}
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'StudyFlow Build Result: ${{ needs.build-and-test.result }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
      continue-on-error: true
