#-------------------------------------------------------------------------------#
#            Discover all capabilities of Qodana in our documentation           #
#             https://www.jetbrains.com/help/qodana/about-qodana.html           #
#-------------------------------------------------------------------------------#

name: Qodana Code Quality

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write   # for SARIF upload to GitHub Security tab

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0         # full history for accurate new-code detection

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # Compile the project so Qodana can resolve all types and dependencies.
      # bootstrap in qodana.yaml also does this, but running it here lets us
      # cache the Maven repo and fail fast before Qodana spins up.
      - name: 🔨 Compile backend (skip tests & style checks)
        working-directory: ./backend
        run: ./mvnw compile test-compile -DskipTests -Dcheckstyle.skip=true -Dspotbugs.skip=true --no-transfer-progress -q

      - name: 🔍 Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          # Analyse only changed files on PRs for faster feedback;
          # full scan on push to main/develop
          pr-mode: ${{ github.event_name == 'pull_request' }}
          use-caches: true
          cache-default-branch-only: true
          post-pr-comment: true
          use-annotations: true
          upload-result: true      # always save SARIF + logs as artifacts

      - name: 📊 Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
        continue-on-error: true   # SARIF upload requires Advanced Security; skip gracefully

