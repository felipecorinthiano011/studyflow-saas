name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://studyflow.app

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 🔨 Build Backend
      working-directory: ./backend
      run: ./mvnw clean package -DskipTests -q

    - name: 🐳 Build Docker image
      run: |
        cd backend
        docker build -t studyflow-backend:${{ github.sha }} .
        docker tag studyflow-backend:${{ github.sha }} studyflow-backend:latest

    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 📤 Push Docker image
      run: |
        docker push studyflow-backend:${{ github.sha }}
        docker push studyflow-backend:latest

    - name: 🚀 Deploy to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      run: |
        npm install -g @railway/cli
        railway link --projectId $RAILWAY_PROJECT_ID
        railway deploy --environment $RAILWAY_ENVIRONMENT_ID

    - name: 🔍 Health Check
      run: |
        echo "Aguardando 30 segundos para a aplicação iniciar..."
        sleep 30
        
        HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" https://studyflow-api.railway.app/actuator/health)
        
        if [ "$HEALTH_CHECK" = "200" ]; then
          echo "✅ Health check passou!"
        else
          echo "❌ Health check falhou com status: $HEALTH_CHECK"
          exit 1
        fi

    - name: 📢 Notify deployment
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: '✅ Deploy to ${{ github.event.inputs.environment || 'production' }} successful!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,took

    - name: 🚨 Notify failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: '❌ Deploy to ${{ github.event.inputs.environment || 'production' }} failed!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author

