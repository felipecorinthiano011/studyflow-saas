name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 🔧 Make mvnw executable
      run: chmod +x mvnw

    - name: 🔨 Build Backend
      run: ./mvnw clean package -DskipTests -q

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔐 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 📤 Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: ✅ Image pushed
      run: |
        echo "✅ Image pushed:"
        echo "  ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:latest"
        echo "  ${{ secrets.DOCKER_USERNAME }}/studyflow-backend:${{ github.sha }}"

    - name: 🚀 Deploy to Railway
      if: ${{ secrets.RAILWAY_TOKEN != '' }}
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      run: |
        npm install -g @railway/cli
        railway link --projectId $RAILWAY_PROJECT_ID
        railway deploy --environment $RAILWAY_ENVIRONMENT_ID
      continue-on-error: true

    - name: 🔍 Health Check
      if: ${{ secrets.APP_URL != '' }}
      run: |
        echo "⏳ Aguardando 30 segundos para a aplicação iniciar..."
        sleep 30
        
        HEALTH_URL="${{ secrets.APP_URL }}/actuator/health"
        echo "Verificando: $HEALTH_URL"
        HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
        
        if [ "$HEALTH_CHECK" = "200" ]; then
          echo "✅ Health check passou! (HTTP $HEALTH_CHECK)"
        else
          echo "⚠️ Health check retornou HTTP $HEALTH_CHECK"
          echo "Verifique se a aplicação está rodando corretamente"
        fi
      continue-on-error: true

    - name: 📢 Notify success
      if: success()
      run: |
        echo "=================================="
        echo "✅ DEPLOY REALIZADO COM SUCESSO!"
        echo " Ambiente: ${{ github.event.inputs.environment || 'production' }}"
        echo " Commit:   ${{ github.sha }}"
        echo " Tag:      ${{ github.ref_name }}"
        echo "=================================="

    - name: 📢 Notify failure
      if: failure()
      run: |
        echo "=================================="
        echo "❌ DEPLOY FALHOU!"
        echo " Ambiente: ${{ github.event.inputs.environment || 'production' }}"
        echo " Commit:   ${{ github.sha }}"
        echo "=================================="

    - name: 📢 Send Slack notification success
      if: success() && secrets.SLACK_WEBHOOK != ''
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: '✅ Deploy to ${{ github.event.inputs.environment || ''production'' }} successful!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,took
      continue-on-error: true

    - name: 🚨 Send Slack notification failure
      if: failure() && secrets.SLACK_WEBHOOK != ''
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: '❌ Deploy to ${{ github.event.inputs.environment || ''production'' }} failed!'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
      continue-on-error: true
