sonar.projectKey=felipecorinthiano011_studyflow-saas
sonar.organization=felipecorinthiano011
sonar.projectName=StudyFlow SaaS Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# ── Source & Test roots ────────────────────────────────────────────────────────
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/Test*.java
sonar.sourceEncoding=UTF-8
sonar.language=java
sonar.java.source=21

# ── Compiled classes (required for accurate analysis) ─────────────────────────
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.java.libraries=backend/target/dependency/*.jar,\
  ${user.home}/.m2/repository/**/*.jar

# ── Code Coverage (JaCoCo) ────────────────────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# ── Source exclusions ─────────────────────────────────────────────────────────
# Exclude only pure data-carrier / boilerplate code — keep business logic in scope
sonar.exclusions=\
  **/shared/dto/**,\
  **/shared/constant/**,\
  **/shared/event/**,\
  **/domain/**/entity/**,\
  **/BackendApplication.java

# ── Coverage exclusions ───────────────────────────────────────────────────────
sonar.coverage.exclusions=\
  **/shared/dto/**,\
  **/shared/constant/**,\
  **/shared/event/**,\
  **/domain/**/entity/**,\
  **/config/**,\
  **/BackendApplication.java

# ── Duplication exclusions (DTOs are expected to be similar) ─────────────────
sonar.cpd.exclusions=\
  **/shared/dto/**,\
  **/domain/**/entity/**

# ── Issue suppression rules ───────────────────────────────────────────────────
# Suppress "Tests should include assertions" for integration & performance tests
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S2699
sonar.issue.ignore.multicriteria.e1.resourceKey=**/performance/**
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S2699
sonar.issue.ignore.multicriteria.e2.resourceKey=**/integration/**

# ── New-code tracking ─────────────────────────────────────────────────────────
sonar.newCode.referenceBranch=main

# ── SCM ───────────────────────────────────────────────────────────────────────
sonar.scm.provider=git

# ── Quality Gate ──────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true

