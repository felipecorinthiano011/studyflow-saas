version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studyflow-postgres
    environment:
      POSTGRES_DB: studyflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 97553796
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: studyflow-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: studyflow
      DB_USER: postgres
      DB_PASSWORD: 97553796
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
