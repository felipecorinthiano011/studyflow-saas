spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable cache and Redis in tests
spring.cache.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable Redis health check in tests
management.health.redis.enabled=false

# Dedicated test secret — never used in production.
# Satisfies jwt.secret=${JWT_SECRET} which has no default in application.properties.
jwt.secret=test-only-jwt-secret-key-not-used-in-production-safe

