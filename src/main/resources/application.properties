spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studyflow}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:studyflow-dev-secret-key-change-in-production-32chars}

# CORS: override with CORS_ALLOWED_ORIGINS env var in production
CORS_ALLOWED_ORIGINS=http://localhost:4200

# Cache: simple in-memory for dev; use redis in prod
spring.cache.type=simple
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Actuator: expose health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false

