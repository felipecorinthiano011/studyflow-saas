spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studyflow}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# No default — application will refuse to start if JWT_SECRET is not set.
# Set this in your .env file (dev) or as a Railway/platform variable (prod/staging).
jwt.secret=${JWT_SECRET}

# CORS: override with CORS_ALLOWED_ORIGINS env var in production
CORS_ALLOWED_ORIGINS=http://localhost:4200

# Cache: simple in-memory for dev; use redis in prod
spring.cache.type=simple
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Actuator: expose health endpoint only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false

# Rate limiting: set to true when running behind a trusted reverse proxy
security.rate-limit.trust-proxy-headers=false

# Refresh token expiration (days); override via REFRESH_TOKEN_EXPIRATION_DAYS env var
refresh.token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# Sentry: set SENTRY_DSN env var to enable error tracking
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:dev}
sentry.traces-sample-rate=0.2

