spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:studyflow}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:studyflow-dev-secret-key-change-in-production-32chars}

# CORS: override with CORS_ALLOWED_ORIGINS env var in production
CORS_ALLOWED_ORIGINS=http://localhost:4200

