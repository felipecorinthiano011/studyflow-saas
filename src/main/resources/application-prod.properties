# Railway injeta automaticamente as variáveis PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
# quando você linka o serviço PostgreSQL ao backend
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Railway define a porta dinamicamente via variável PORT
server.port=${PORT:8080}

# CORS: set CORS_ALLOWED_ORIGINS in Railway Variables (e.g. https://your-app.vercel.app)
# Multiple origins: https://app.vercel.app,https://preview.vercel.app
CORS_ALLOWED_ORIGINS=https://studyflow-saas-frontend.vercel.app

# Cache com Redis (Railway injeta REDIS_URL ao linkar Redis)
spring.cache.type=redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.cache.redis.time-to-live=600000

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=false

